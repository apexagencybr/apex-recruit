<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Apex Recruit</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;

background:
linear-gradient(
180deg,
#000000 0%,
#000000 25%,
#22040c 55%,
#3a0715 100%
);

min-height:100vh;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

.logo{
text-align:center;
margin-top:10px;
margin-bottom:20px;
}

.logo img{
width:160px;
}

.card{
background:#111;
border-radius:18px;
padding:18px;
margin-bottom:16px;
border:1px solid rgba(255,255,255,0.06);
}

h1{
margin:0;
font-size:24px;
}

.subtitle{
color:#aaa;
font-size:14px;
margin-top:6px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:16px;
}

.stat{
background:#0f0f14;
padding:14px;
border-radius:14px;
}

.stat-title{
font-size:12px;
color:#aaa;
}

.stat-number{
font-size:28px;
font-weight:bold;
margin-top:6px;
}

.rank-item{
background:#0f0f14;
padding:12px;
border-radius:12px;
margin-top:10px;
}

.rank-name{
font-weight:bold;
}

.rank-bar{
height:8px;
background:#222;
border-radius:6px;
margin-top:6px;
overflow:hidden;
}

.rank-fill{
height:100%;
background:linear-gradient(90deg,#ff4f8f,#22d3ee);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
font-weight:bold;
cursor:pointer;
}

.btn{
background:#161821;
color:white;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#0f0f14;
color:white;
margin-top:8px;
}

.creator{
background:#0f0f14;
padding:14px;
border-radius:12px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="icon-512.png">
</div>

<div class="card">

<h1 id="welcome">Bem-vindo</h1>
<div class="subtitle">Painel de recrutamento Apex</div>

<div class="stats">

<div class="stat">
<div class="stat-title">Recrutados</div>
<div id="totalRecruited" class="stat-number">0</div>
</div>

<div class="stat">
<div class="stat-title">Ranking</div>
<div id="rankingPosition" class="stat-number">-</div>
</div>

</div>

</div>

<div class="card">

<h2>Ranking</h2>

<div id="rankingList"></div>

<button id="toggleCreators" class="btn">
Ver recrutados
</button>

<div id="creatorsArea" style="display:none">

<input id="search" placeholder="Buscar criador">

<div id="creatorsList"></div>

</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzxLQzN4jAuLHdI3o2JUBFOHObnMBzySznhAdg_d3zx3u4u-fuUTj4llIVJjfA04vW6/exec"

function shortEmail(email){
if(!email)return "agente"
return email.split("@")[0]
}

async function loadData(){

const res=await fetch(API+"?action=profile")
const data=await res.json()

if(!data.profile)return

const agent=data.profile.agent

document.getElementById("welcome").innerText=
"Bem-vindo @"+shortEmail(agent)

document.getElementById("totalRecruited").innerText=
data.profile.totalRecruited||0

document.getElementById("rankingPosition").innerText=
data.profile.rankingPosition+"º"

renderRanking(data.profile.ranking)

renderCreators(data.profile.creators)

}

function renderRanking(list){

const el=document.getElementById("rankingList")
el.innerHTML=""

let max=1

list.forEach(i=>{
if(i.total>max)max=i.total
})

list.forEach((item,i)=>{

const div=document.createElement("div")
div.className="rank-item"

const percent=Math.round(item.total/max*100)

div.innerHTML=`
<div class="rank-name">${i+1}º @${shortEmail(item.agent)}</div>
<div>${item.total} recrutados</div>
<div class="rank-bar">
<div class="rank-fill" style="width:${percent}%"></div>
</div>
`

el.appendChild(div)

})

}

function renderCreators(list){

const el=document.getElementById("creatorsList")
el.innerHTML=""

list.forEach(c=>{

const div=document.createElement("div")
div.className="creator"

div.innerHTML=`
<b>${c.username}</b><br>
Entrou: ${c.joinedAt}
`

el.appendChild(div)

})

}

document.getElementById("toggleCreators").onclick=()=>{

const area=document.getElementById("creatorsArea")

area.style.display=
area.style.display=="none"
?"block"
:"none"

}

document.getElementById("search").oninput=(e)=>{

const text=e.target.value.toLowerCase()

document.querySelectorAll(".creator").forEach(c=>{

c.style.display=
c.innerText.toLowerCase().includes(text)
?"block"
:"none"

})

}

loadData()

</script>

</body>
</html>
